{% extends "base.html" %}
{% block title %}Your Results — LogiCore{% endblock %}

{% block extra_styles %}
<style>
  .results-page {
    padding: 5rem 2rem 5rem;
    min-height: 100vh;
  }

  .results-wrap {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── TOP SUMMARY ── */
  .results-summary {
    background: var(--gradient-card);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .summary-avatar {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    color: white;
    flex-shrink: 0;
  }

  .summary-info { flex: 1; }
  .summary-name {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
  }
  .summary-meta {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: var(--font-mono);
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .summary-stats {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .sum-stat {
    text-align: center;
  }

  .sum-stat-num {
    font-family: var(--font-display);
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .sum-stat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 0.75rem 1.5rem;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: -1px;
  }

  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active {
    color: var(--accent-blue);
    border-bottom-color: var(--accent-blue);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── RECOMMENDATION CARDS ── */
  .rec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  .rec-card {
    background: var(--gradient-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.75rem;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .rec-card.top-pick {
    border-color: rgba(79,195,247,0.4);
    box-shadow: 0 0 30px rgba(79,195,247,0.1);
  }

  .rec-card:hover {
    border-color: var(--border-bright);
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.3);
  }

  .rec-rank {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    font-family: var(--font-display);
    font-size: 2.5rem;
    color: var(--border);
    line-height: 1;
  }

  .rec-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .rec-cat-icon {
    font-size: 2rem;
    flex-shrink: 0;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .rec-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .rec-cat-name {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .rec-desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  /* ── SCORE BAR ── */
  .score-section {
    margin-bottom: 1rem;
  }

  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.4rem;
  }

  .score-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .score-value {
    font-family: var(--font-display);
    font-size: 1.4rem;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet));
    border-radius: 3px;
    transition: width 1s ease;
  }

  .rec-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }

  .rec-tag {
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  /* Reasons & warnings */
  .reasons-list { list-style: none; }
  .reasons-list li {
    display: flex;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    padding: 0.35rem 0;
    line-height: 1.5;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .reasons-list li:last-child { border-bottom: none; }
  .reason-icon { color: var(--accent-emerald); flex-shrink: 0; margin-top: 2px; }
  .warn-icon { color: var(--accent-amber); flex-shrink: 0; margin-top: 2px; }

  /* ── INFERENCE TRACE ── */
  .trace-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .trace-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.02);
  }

  .trace-title {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .trace-body {
    padding: 1.25rem 1.5rem;
    max-height: 500px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 0.8rem;
  }

  .trace-line {
    margin-bottom: 0.5rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border-left: 3px solid transparent;
    line-height: 1.5;
  }

  .trace-line.init {
    background: rgba(79,195,247,0.05);
    border-left-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .trace-line.rule {
    background: rgba(52,211,153,0.04);
    border-left-color: var(--accent-emerald);
    color: var(--text-secondary);
  }

  .trace-line.done {
    background: rgba(167,139,250,0.05);
    border-left-color: var(--accent-violet);
    color: var(--accent-violet);
  }

  .trace-step {
    font-weight: 700;
    margin-bottom: 0.15rem;
    display: block;
  }

  /* ── RULE SUMMARY ── */
  .rule-category-section {
    margin-bottom: 1.5rem;
  }

  .rule-cat-header {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-blue);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .rule-item {
    display: flex;
    gap: 12px;
    padding: 0.9rem 1rem;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 0.5rem;
  }

  .rule-id {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    background: rgba(79,195,247,0.1);
    color: var(--accent-blue);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 4px;
    padding: 0.2rem 0.5rem;
    height: fit-content;
    flex-shrink: 0;
  }

  .rule-info {}
  .rule-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.2rem;
  }
  .rule-explanation {
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .rule-weight {
    margin-left: auto;
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--accent-amber);
  }

  /* ── Print / Export ── */
  .action-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  @media (max-width: 700px) {
    .rec-grid { grid-template-columns: 1fr; }
    .results-summary { flex-direction: column; text-align: center; }
  }
</style>
{% endblock %}

{% block content %}
<div class="results-page">
  <div class="results-wrap" id="resultsWrap">

    <!-- Loading placeholder while JS loads data -->
    <div id="loadingPlaceholder" style="text-align:center; padding:8rem 2rem;">
      <div style="width:50px;height:50px;border:3px solid var(--border);border-top-color:var(--accent-blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
      <p style="color:var(--text-muted); font-family:var(--font-mono);">Loading your results...</p>
    </div>

    <div id="resultsContent" style="display:none;">

      <!-- SUMMARY BAR -->
      <div class="results-summary animate-fade-up" id="summaryBar">
        <!-- Filled by JS -->
      </div>

      <!-- ACTION BAR -->
      <div class="action-bar animate-fade-up delay-1">
        <a href="/consult" class="btn btn-ghost" style="font-size:0.85rem;">
          <i class="fas fa-redo"></i> New Consultation
        </a>
        <button class="btn btn-ghost" onclick="window.print()" style="font-size:0.85rem;">
          <i class="fas fa-print"></i> Print Report
        </button>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('recommendations', this)">
          <i class="fas fa-lightbulb"></i> Recommendations
        </button>
        <button class="tab-btn" onclick="showTab('explanation', this)">
          <i class="fas fa-brain"></i> Explanation Module
        </button>
        <button class="tab-btn" onclick="showTab('trace', this)">
          <i class="fas fa-terminal"></i> Inference Trace
        </button>
        <button class="tab-btn" onclick="showTab('profile', this)">
          <i class="fas fa-user"></i> Student Profile
        </button>
      </div>

      <!-- TAB: RECOMMENDATIONS -->
      <div class="tab-content active" id="tab-recommendations">
        <div class="rec-grid" id="recGrid">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- TAB: EXPLANATION MODULE -->
      <div class="tab-content" id="tab-explanation">
        <div id="explanationContent">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- TAB: INFERENCE TRACE -->
      <div class="tab-content" id="tab-trace">
        <div class="trace-container">
          <div class="trace-header">
            <i class="fas fa-terminal" style="color:var(--accent-blue);"></i>
            <div class="trace-title">forward_chaining_trace.log — Full Reasoning Chain</div>
          </div>
          <div class="trace-body" id="traceBody">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>

      <!-- TAB: STUDENT PROFILE -->
      <div class="tab-content" id="tab-profile">
        <div class="card" id="profileContent">
          <!-- Filled by JS -->
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const SKILL_LABELS = {
    python:"Python",javascript:"JavaScript",java_kotlin:"Java/Kotlin",swift_dart:"Swift/Dart",
    c_cpp:"C/C++",html_css:"HTML & CSS",sql:"SQL",databases:"Databases",networking:"Networking",
    cryptography:"Cryptography",algorithms:"Algorithms",math:"Mathematics",statistics:"Statistics",
    linux:"Linux",scripting:"Scripting",hardware:"Hardware",ui_design:"UI/UX",
    visualization:"Data Viz",solidity:"Solidity",logic:"Formal Logic"
  };

  const TYPE_LABELS = {
    eligibility: "📊 GPA & Eligibility",
    time: "⏰ Time Management",
    skill_match: "🔧 Skill Matching",
    career: "🎯 Career Alignment",
    risk: "⚠️ Risk Assessment",
    group: "👥 Group Dynamics",
    preference: "⭐ Preferences"
  };

  function showTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function complexityBadge(c) {
    const map = {
      beginner: 'badge-emerald', intermediate: 'badge-blue',
      advanced: 'badge-violet', expert: 'badge-rose'
    };
    return `<span class="badge ${map[c]||'badge-blue'}">${c}</span>`;
  }

  function riskBadge(r) {
    const map = { low: 'badge-emerald', medium: 'badge-amber', high: 'badge-rose' };
    return `<span class="badge ${map[r]||'badge-amber'}">risk: ${r}</span>`;
  }

  function renderRecommendations(recs) {
    const grid = document.getElementById('recGrid');
    grid.innerHTML = recs.map((rec, i) => `
      <div class="rec-card ${i===0?'top-pick':''} animate-fade-up" style="animation-delay:${i*0.08}s">
        <div class="rec-rank">${String(i+1).padStart(2,'0')}</div>
        ${i===0 ? '<div style="position:absolute;top:1.25rem;left:1.25rem;"><span class="badge badge-amber">⭐ Top Pick</span></div><br><br>' : ''}

        <div class="rec-header">
          <div class="rec-cat-icon">${rec.category_icon}</div>
          <div>
            <div class="rec-title">${rec.title}</div>
            <div class="rec-cat-name">${rec.category_name}</div>
          </div>
        </div>

        <p class="rec-desc">${rec.description}</p>

        <div class="score-section">
          <div class="score-header">
            <span class="score-label">Match Score</span>
            <span class="score-value">${rec.score}%</span>
          </div>
          <div class="score-bar">
            <div class="score-fill" style="width:${rec.score}%"></div>
          </div>
        </div>

        <div class="rec-tags">
          ${complexityBadge(rec.complexity)}
          ${riskBadge(rec.risk)}
          <span class="badge badge-cyan">${rec.duration_weeks}w</span>
          ${rec.tools.slice(0,3).map(t => `<span class="rec-tag">${t}</span>`).join('')}
        </div>

        <ul class="reasons-list">
          ${rec.reasons.slice(0,3).map(r => `<li><i class="fas fa-check-circle reason-icon"></i>${r}</li>`).join('')}
          ${rec.warnings.slice(0,2).map(w => `<li><i class="fas fa-exclamation-triangle warn-icon"></i>${w}</li>`).join('')}
        </ul>
      </div>
    `).join('');
  }

  function renderExplanation(result) {
    const rulesByType = result.rule_summary;
    const container = document.getElementById('explanationContent');
    let html = `
      <div style="margin-bottom:1.5rem; padding:1.5rem; background:var(--bg-card); border:1px solid var(--border-bright); border-radius:16px;">
        <div style="font-family:var(--font-display); font-size:1.4rem; margin-bottom:0.5rem; color:var(--text-primary);">Why These Recommendations?</div>
        <p style="color:var(--text-secondary); font-size:0.9rem; line-height:1.7;">
          The inference engine fired <strong style="color:var(--accent-blue)">${result.total_rules_fired} rules</strong> during forward chaining analysis of your profile. 
          Below is a categorized breakdown of every rule that contributed to your recommendations.
        </p>
      </div>
    `;
    for (const [type, rules] of Object.entries(rulesByType)) {
      html += `<div class="rule-category-section">
        <div class="rule-cat-header">${TYPE_LABELS[type] || type}</div>
        ${rules.map(r => `
          <div class="rule-item">
            <div class="rule-id">${r.id}</div>
            <div class="rule-info">
              <div class="rule-name">${r.name}</div>
              <div class="rule-explanation">${r.explanation}</div>
            </div>
            <div class="rule-weight">w: ${r.weight}</div>
          </div>
        `).join('')}
      </div>`;
    }
    container.innerHTML = html;
  }

  function renderTrace(trace) {
    const body = document.getElementById('traceBody');
    body.innerHTML = trace.map(t => {
      let cls = 'rule';
      if (t.step.includes('INIT')) cls = 'init';
      if (t.step.includes('COMP')) cls = 'done';
      return `<div class="trace-line ${cls}">
        <span class="trace-step">[${t.step}]</span>
        <span>${t.message}</span>
        ${t.conclusion ? `<div style="margin-top:0.3rem; color:var(--accent-emerald); font-size:0.75rem;">→ ${JSON.stringify(t.conclusion)}</div>` : ''}
      </div>`;
    }).join('');
  }

  function renderProfile(student, derived) {
    const container = document.getElementById('profileContent');
    const skills = (student.skills || []).map(s => SKILL_LABELS[s]||s);
    container.innerHTML = `
      <div style="font-family:var(--font-display); font-size:1.5rem; margin-bottom:1.5rem; color:var(--text-primary);">Student Profile Summary</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
        <div>
          <div style="font-size:0.75rem; font-family:var(--font-mono); color:var(--accent-blue); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.5rem;">Identity</div>
          <table style="width:100%; border-collapse:collapse; font-size:0.88rem;">
            <tr><td style="color:var(--text-muted); padding:0.4rem 0; width:40%;">Name</td><td style="color:var(--text-primary);">${student.name}</td></tr>
            <tr><td style="color:var(--text-muted); padding:0.4rem 0;">Admission</td><td style="color:var(--text-primary);">${student.admission||'—'}</td></tr>
            <tr><td style="color:var(--text-muted); padding:0.4rem 0;">GPA</td><td><strong style="color:var(--accent-blue);">${student.gpa}</strong></td></tr>
            <tr><td style="color:var(--text-muted); padding:0.4rem 0;">Group Size</td><td style="color:var(--text-primary);">${student.group_size}</td></tr>
            <tr><td style="color:var(--text-muted); padding:0.4rem 0;">Experience</td><td style="color:var(--text-primary);">${student.experience_months} months</td></tr>
            <tr><td style="color:var(--text-muted); padding:0.4rem 0;">Weekly Hours</td><td style="color:var(--text-primary);">${student.weekly_hours} hrs</td></tr>
          </table>
        </div>
        <div>
          <div style="font-size:0.75rem; font-family:var(--font-mono); color:var(--accent-blue); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.5rem;">Derived Facts</div>
          <div style="font-size:0.82rem; line-height:1.8; color:var(--text-secondary);">
            ${Object.entries(derived).map(([k,v]) => `<div><span style="color:var(--text-muted);">${k}:</span> <span style="color:var(--accent-emerald);">${JSON.stringify(v)}</span></div>`).join('')}
          </div>
        </div>
      </div>
      <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border);">
        <div style="font-size:0.75rem; font-family:var(--font-mono); color:var(--accent-blue); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.75rem;">Selected Skills</div>
        <div style="display:flex; flex-wrap:wrap; gap:0.4rem;">
          ${skills.map(s => `<span class="badge badge-blue">${s}</span>`).join('')}
          ${skills.length===0?'<span style="color:var(--text-muted); font-size:0.85rem;">No skills selected</span>':''}
        </div>
      </div>
    `;
  }

  function renderSummary(result) {
    const s = result.student;
    const recs = result.recommendations;
    const topScore = recs.length > 0 ? recs[0].score : 0;
    document.getElementById('summaryBar').innerHTML = `
      <div class="summary-avatar">👨‍💻</div>
      <div class="summary-info">
        <div class="summary-name">${s.name}</div>
        <div class="summary-meta">
          <span><i class="fas fa-id-card" style="margin-right:4px;"></i>${s.admission||'—'}</span>
          <span><i class="fas fa-graduation-cap" style="margin-right:4px;"></i>GPA: ${s.gpa}</span>
          <span><i class="fas fa-briefcase" style="margin-right:4px;"></i>${s.career_goal||'Not specified'}</span>
        </div>
      </div>
      <div class="summary-stats">
        <div class="sum-stat">
          <div class="sum-stat-num">${result.recommendations.length}</div>
          <div class="sum-stat-label">Projects Matched</div>
        </div>
        <div class="sum-stat">
          <div class="sum-stat-num">${result.total_rules_fired}</div>
          <div class="sum-stat-label">Rules Fired</div>
        </div>
        <div class="sum-stat">
          <div class="sum-stat-num">${topScore}%</div>
          <div class="sum-stat-label">Top Match Score</div>
        </div>
      </div>
    `;
  }

  // Load result from sessionStorage
  window.addEventListener('load', () => {
    const raw = sessionStorage.getItem('logicoreResult');
    if (!raw) {
      document.getElementById('loadingPlaceholder').innerHTML = `
        <div style="padding:4rem; text-align:center;">
          <p style="color:var(--accent-rose); font-family:var(--font-mono); margin-bottom:1rem;">No consultation data found.</p>
          <a href="/consult" class="btn btn-primary">Start a Consultation</a>
        </div>`;
      return;
    }
    const result = JSON.parse(raw);
    document.getElementById('loadingPlaceholder').style.display = 'none';
    document.getElementById('resultsContent').style.display = 'block';

    renderSummary(result);
    renderRecommendations(result.recommendations);
    renderExplanation(result);
    renderTrace(result.inference_trace);
    renderProfile(result.student, result.derived_facts);

    // Animate score bars
    setTimeout(() => {
      document.querySelectorAll('.score-fill').forEach(el => {
        const target = el.style.width;
        el.style.width = '0%';
        setTimeout(() => { el.style.width = target; }, 100);
      });
    }, 200);
  });
</script>
{% endblock %}
